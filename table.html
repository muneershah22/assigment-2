<!DOCTYPE html>
<html>
<head>
    <title>Periodic Table</title>

    <style>

        table{
            border-collapse: collapse;
            margin: auto;
        }

        td{
            width: 50px;
            height: 50px;
            text-align: center;
            border: 1px solid black;
            font-weight: bold;
        }

        .orange{
            background-color: orange;
        }

        .yellow{
            background-color: yellow;
        }

        .green{
            background-color: lightgreen;
        }

        .blue{
            background-color: lightblue;
        }

        .pink{
            background-color: hotpink;
        }

    </style>
</head>

<body>

<table>

    <tr>
        <td class="green">H</td>

        
        <td colspan="16" style="border:none;"></td>

        <td class="pink">He</td>
    </tr>

    <tr>
        <td class="orange">Li</td>
        <td class="orange">Be</td>

        <td colspan="10" style="border:none;"></td>

        <td class="green">B</td>
        <td class="green">C</td>
        <td class="green">N</td>
        <td class="green">O</td>
        <td class="green">F</td>
        <td class="pink">Ne</td>
    </tr>

    <tr>
        <td class="orange">Na</td>
        <td class="orange">Mg</td>

        <td colspan="10" style="border:none;"></td>

        <td class="blue">Al</td>
        <td class="green">Si</td>
        <td class="green">P</td>
        <td class="green">S</td>
        <td class="green">Cl</td>
        <td class="pink">Ar</td>
    </tr>

    <tr>
        <td class="orange">K</td>
        <td class="orange">Ca</td>
        <td class="yellow">Sc</td>
        <td class="yellow">Ti</td>
        <td class="yellow">V</td>
        <td class="yellow">Cr</td>
        <td class="yellow">Mn</td>
        <td class="yellow">Fe</td>
        <td class="yellow">Co</td>
        <td class="yellow">Ni</td>
        <td class="yellow">Cu</td>
        <td class="yellow">Zn</td>
        <td class="blue">Ga</td>
        <td class="green">Ge</td>
        <td class="green">As</td>
        <td class="green">Se</td>
        <td class="green">Br</td>
        <td class="pink">Kr</td>
    </tr>

</table>

</body>
</html>
